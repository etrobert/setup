---
name: Nix

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs per ref when iterating fast, but never on main:
# every main commit must finish and push to cachix (pi auto-upgrades from it).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Check
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3
        # eval-cores = 1 pins single-threaded evaluation. Determinate Nix's
        # parallel evaluator (default since the eval-cores default flipped to
        # all-cores) has concurrency bugs that intermittently SIGSEGV during
        # `nix flake check --all-systems` — the heaviest eval, evaluating every
        # output for every system. Drop once the parallel evaluator is fixed.
        with:
          extra-conf: |
            eval-cores = 1

      - name: Format Check
        run: nix fmt . -- --ci

      - name: Flake Check
        run: nix flake check --accept-flake-config

      - name: Flake Check (all systems, eval only)
        run: nix flake check --all-systems --no-build --accept-flake-config

  probe:
    name: Pick runner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      # RUNNER_PROBE_TOKEN: fine-grained PAT with runners read on this
      # repo — the runners API needs a permission GITHUB_TOKEN cannot be
      # granted. An invalid token fails the probe (and the build) loudly;
      # an absent or offline runner falls back to the hosted runner.
      - id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_PROBE_TOKEN }}
        run: |
          status=$(gh api "repos/${{ github.repository }}/actions/runners" \
            --jq '.runners[] | select(.name == "aaron") | .status')
          if [ "$status" = "online" ]
          then runner='["self-hosted", "macOS"]'
          else runner='"macos-latest"'
          fi
          echo "aaron status: $status; picked $runner"
          echo "runner=$runner" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.host }}
    needs: probe
    runs-on: ${{ fromJSON(matrix.runner) }}
    permissions:
      contents: read
    strategy:
      # runner values are JSON strings (parsed by the fromJSON in runs-on)
      # because aaron's comes from the probe and job outputs are strings.
      matrix:
        include:
          - host: tower
            runner: '["self-hosted", "Linux"]'
            platform: nixos
          - host: leod
            runner: '["self-hosted", "Linux"]'
            platform: nixos
          - host: pi
            runner: '["self-hosted", "Linux"]'
            platform: nixos
          - host: aaron
            runner: ${{ needs.probe.outputs.runner }}
            platform: darwin
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3

      # Self-hosted jobs skip this: tower's post-build hook pushes what it
      # builds, and the action can't work there anyway — its `cachix use`
      # needs a nix trusted user, which the runner user deliberately isn't.
      # continue-on-error: cache push failures (e.g. cachix 502s) shouldn't
      # fail the job
      - uses: cachix/cachix-action@v17
        if: ${{ !contains(matrix.runner, 'self-hosted') }}
        continue-on-error: true
        with:
          name: soft-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: |
          attr="${{ matrix.platform }}Configurations.${{ matrix.host }}"
          # --fallback: build a path from source when its substitute can't be
          # realised. cache.nixos.org currently serves a corrupted NAR for the
          # aarch64 openapv-0.2.1.2 (an ffmpeg/navidrome dep), failing the pi
          # build with a hash mismatch on import. Falling back to a source build
          # of that single path recovers it while keeping everything else
          # cached, and makes CI resilient to future cache corruption.
          nix build ".#$attr.config.system.build.toplevel" \
            --accept-flake-config \
            --print-build-logs \
            --fallback \
            --option stalled-download-timeout 10
