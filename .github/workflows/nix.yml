---
name: Nix

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs per ref when iterating fast, but never on main:
# every main commit must finish and push to cachix (pi auto-upgrades from it).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3
        # eval-cores = 1 pins single-threaded evaluation. Determinate Nix's
        # parallel evaluator (default since the eval-cores default flipped to
        # all-cores) has concurrency bugs that intermittently SIGSEGV during
        # `nix flake check --all-systems` — the heaviest eval, evaluating every
        # output for every system. Drop once the parallel evaluator is fixed.
        with:
          extra-conf: |
            eval-cores = 1

      # continue-on-error: cache push failures (e.g. cachix 502s) shouldn't
      # fail the job
      - uses: cachix/cachix-action@v17
        continue-on-error: true
        with:
          name: soft-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Format Check
        run: nix fmt . -- --ci

      - name: Flake Check
        run: nix flake check --accept-flake-config

      - name: Flake Check (all systems, eval only)
        run: nix flake check --all-systems --no-build --accept-flake-config

  # Discover every host the flake exposes so the build matrix doesn't have to
  # be maintained by hand — adding a nixos-/darwin-Configuration is enough.
  # Each host's arch (from nixpkgs.hostPlatform) picks its runner.
  discover:
    name: Discover configurations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Build matrix from flake
        id: set
        run: |
          systems() {
            nix eval --json ".#$1" --accept-flake-config \
              --apply 'builtins.mapAttrs (_: c: c.config.nixpkgs.hostPlatform.system)' \
              2>/dev/null || echo '{}'
          }
          matrix=$(jq --compact-output --null-input \
            --argjson nixos "$(systems nixosConfigurations)" \
            --argjson darwin "$(systems darwinConfigurations)" '
              def runner: {
                "x86_64-linux": "ubuntu-latest",
                "aarch64-linux": "ubuntu-24.04-arm",
                "aarch64-darwin": "macos-latest",
                "x86_64-darwin": "macos-13"
              }[.];
              { include:
                [ ($nixos  | to_entries[] | {host: .key, platform: "nixos",  runner: (.value | runner)}),
                  ($darwin | to_entries[] | {host: .key, platform: "darwin", runner: (.value | runner)}) ] }')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.host }}
    runs-on: ${{ matrix.runner }}
    needs: discover
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      # large-packages and docker-images are slow (apt-get). Enable them if
      # disk space becomes an issue.
      - name: Free disk space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: DeterminateSystems/determinate-nix-action@v3

      # continue-on-error: cache push failures (e.g. cachix 502s) shouldn't
      # fail the job
      - uses: cachix/cachix-action@v17
        continue-on-error: true
        with:
          name: soft-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: |
          attr="${{ matrix.platform }}Configurations.${{ matrix.host }}"
          # --fallback: build a path from source when its substitute can't be
          # realised. cache.nixos.org currently serves a corrupted NAR for the
          # aarch64 openapv-0.2.1.2 (an ffmpeg/navidrome dep), failing the pi
          # build with a hash mismatch on import. Falling back to a source build
          # of that single path recovers it while keeping everything else
          # cached, and makes CI resilient to future cache corruption.
          nix build ".#$attr.config.system.build.toplevel" \
            --accept-flake-config \
            --print-build-logs \
            --fallback \
            --option stalled-download-timeout 10
