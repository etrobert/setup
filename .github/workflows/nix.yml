name: Nix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Flake Check
        run: nix flake check ./nix --accept-flake-config

  build:
    name: Build ${{ matrix.host }}
    runs-on: ubuntu-latest
    needs: check
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        host:
          - tower
          - leod
          # - pi # TODO: Fix
          # - aaron # TODO: Fix
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Build ${{ matrix.host }}
        run: |
          nix build ./nix#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --accept-flake-config \
            --extra-substituters "https://nix-community.cachix.org" \
            --extra-trusted-public-keys "nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=" \
            --no-link \
            --print-build-logs
