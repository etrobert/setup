name: Nix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Flake Check
        run: nix flake check ./nix

  build:
    name: Build ${{ matrix.host }}
    runs-on: ubuntu-latest
    needs: check
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        host:
          - tower
          - leod
          - pi
          - aaron
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build ${{ matrix.host }}
        run: |
          nix build ./nix#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --no-link \
            --print-build-logs
