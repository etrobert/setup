name: Nix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3

      # continue-on-error: cache push failures (e.g. cachix 502s) shouldn't fail the job
      - uses: cachix/cachix-action@v17
        continue-on-error: true
        with:
          name: soft-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Format Check
        run: nix fmt . -- --ci

      - name: Flake Check
        run: nix flake check --accept-flake-config

      - name: Flake Check (all systems, eval only)
        run: nix flake check --all-systems --no-build --accept-flake-config

  build:
    name: Build ${{ matrix.host }}
    runs-on: ${{ matrix.runner }}
    needs: check
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - host: tower
            runner: ubuntu-latest
            platform: nixos
          - host: leod
            runner: ubuntu-latest
            platform: nixos
          - host: pi
            runner: ubuntu-24.04-arm
            platform: nixos
          - host: aaron
            runner: macos-latest
            platform: darwin
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3

      # continue-on-error: cache push failures (e.g. cachix 502s) shouldn't fail the job
      - uses: cachix/cachix-action@v17
        continue-on-error: true
        with:
          name: soft-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: |
          nix build .#${{ matrix.platform }}Configurations.${{ matrix.host }}.config.system.build.toplevel \
            --accept-flake-config \
            --print-build-logs \
            --option stalled-download-timeout 10
