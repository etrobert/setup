---
name: Build

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs per ref when iterating fast, but never on main:
# every main commit must finish and push to cachix (pi auto-upgrades from it).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  probe:
    name: Pick runner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      # RUNNER_PROBE_TOKEN: fine-grained PAT with runners read on this
      # repo — the runners API needs a permission GITHUB_TOKEN cannot be
      # granted. An invalid token fails the probe (and the build) loudly;
      # an absent or offline runner falls back to the hosted runner.
      - id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_PROBE_TOKEN }}
        run: |
          status=$(gh api "repos/${{ github.repository }}/actions/runners" \
            --jq '.runners[] | select(.name == "aaron") | .status')
          if [ "$status" = "online" ]
          then runner='["self-hosted", "macOS"]'
          else runner='"macos-latest"'
          fi
          echo "aaron status: $status; picked $runner"
          echo "runner=$runner" >> "$GITHUB_OUTPUT"

  discover:
    name: discover
    needs: probe
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      # Emit the build matrix from the flake: nixos hosts build on the
      # self-hosted Linux runners, darwin hosts on the runner the probe picked.
      - name: List host configurations
        id: list
        env:
          DARWIN_RUNNER: ${{ needs.probe.outputs.runner }}
        run: |
          nixos=$(nix eval .#nixosConfigurations \
            --apply builtins.attrNames --json)
          darwin=$(nix eval .#darwinConfigurations \
            --apply builtins.attrNames --json)
          # shellcheck disable=SC2016  # $-names are jq variables, not shell
          matrix=$(jq --compact-output --null-input \
            --argjson nixos "$nixos" \
            --argjson darwin "$darwin" \
            --argjson darwinRunner "$DARWIN_RUNNER" \
            '{
              include:
                [$nixos[] | {host: ., platform: "nixos",
                            runner: ["self-hosted", "Linux"]}]
              + [$darwin[] | {host: ., platform: "darwin",
                             runner: $darwinRunner}]
            }')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.host }}
    needs: discover
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      # Self-hosted runners already have Nix; only the hosted fallback needs it.
      - uses: DeterminateSystems/determinate-nix-action@v3
        if: ${{ runner.environment == 'github-hosted' }}

      # Only GitHub-hosted runners push via this action. Self-hosted jobs skip
      # it: tower's post-build hook pushes what it builds, and the action can't
      # work there anyway — its `cachix use` needs a nix trusted user, which the
      # runner user deliberately isn't.
      # continue-on-error: cache push failures (e.g. cachix 502s) shouldn't
      # fail the job
      - uses: cachix/cachix-action@v17
        if: ${{ runner.environment == 'github-hosted' }}
        continue-on-error: true
        with:
          name: soft-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: |
          attr="${{ matrix.platform }}Configurations.${{ matrix.host }}"
          nix build ".#$attr.config.system.build.toplevel" \
            --accept-flake-config \
            --print-build-logs \
            --option stalled-download-timeout 10

  # Aggregation gate: the single required status. It transitively requires every
  # dynamically-discovered host build (the matrix job is failure if any leg
  # fails), so new hosts are covered without touching branch protection.
  all-builds:
    name: all-builds
    needs: [discover, probe, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify all builds succeeded
        if: >-
          ${{ contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped') }}
        run: exit 1

  # Fast-forward the `deploy` ref to this commit so pi's gated autoUpgrade
  # converges within a minute. Gated on all-builds succeeding, which also
  # guarantees the aarch64 closure is already in Cachix (pushed by tower's
  # post-build hook during the build). Main only, and all-builds runs with
  # if: always(), so require its explicit success.
  deploy:
    name: deploy
    needs: all-builds
    if: >-
      ${{ github.ref == 'refs/heads/main'
        && needs.all-builds.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Fast-forward deploy ref
        run: git push origin HEAD:deploy
