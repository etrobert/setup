---
name: Checks

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs per ref when iterating fast, but never on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    name: format
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Format Check
        run: nix fmt . -- --ci

  eval:
    name: eval
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Flake Check (all systems, eval only)
        run: nix flake check --all-systems --no-build --accept-flake-config

  discover:
    name: discover
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    outputs:
      checks: ${{ steps.list.outputs.checks }}
    steps:
      - uses: actions/checkout@v6

      - name: List flake checks
        id: list
        run: |
          checks=$(nix eval .#checks.x86_64-linux \
            --apply builtins.attrNames --json)
          echo "checks=$checks" >> "$GITHUB_OUTPUT"

  lint:
    name: ${{ matrix.check }}
    needs: discover
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    strategy:
      matrix:
        check: ${{ fromJSON(needs.discover.outputs.checks) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Build ${{ matrix.check }}
        run: |
          nix build .#checks.x86_64-linux.${{ matrix.check }} \
            --accept-flake-config \
            --print-build-logs

  # Aggregation gate: this is the single required status. It transitively
  # requires format, eval, and every dynamically-discovered lint leg (the
  # matrix job is failure if any leg fails), so new checks are covered
  # without touching branch protection.
  all:
    name: all
    needs: [format, eval, discover, lint]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify all checks succeeded
        if: >-
          ${{ contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped') }}
        run: exit 1
