name: Update Flake Inputs

on:
  schedule:
    - cron: "0 8 * * 1/2" # every other Monday at 8am UTC (roughly biweekly)
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update flake inputs
        run: nix flake update --flake ./nix

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update flake inputs"
          title: "chore: update flake inputs"
          body: |
            Automated flake input update.

            Review the `flake.lock` diff and merge when CI passes.
          branch: flake-update
          delete-branch: true
