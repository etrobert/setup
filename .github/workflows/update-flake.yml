name: Update Flake Inputs

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC (08:00 Berlin during DST)
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          df -h /

      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - uses: cachix/cachix-action@v17
        with:
          name: soft-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build pre-update system (leod)
        run: |
          nix build ./nix#nixosConfigurations.leod.config.system.build.toplevel \
            --accept-flake-config \
            --no-link \
            --print-out-paths > /tmp/before

      - name: Update flake inputs
        run: nix flake update --flake ./nix --accept-flake-config

      - name: Build post-update system (leod)
        run: |
          nix build ./nix#nixosConfigurations.leod.config.system.build.toplevel \
            --accept-flake-config \
            --no-link \
            --print-out-paths > /tmp/after

      - name: Compute package diff
        id: diff
        run: |
          {
            echo "diff<<EOF"
            nix store diff-closures "$(cat /tmp/before)" "$(cat /tmp/after)"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT }}
          commit-message: "chore: update flake inputs"
          title: "chore: update flake inputs"
          body: |
            Automated flake input update.

            ## Package changes (leod)

            ```
            ${{ steps.diff.outputs.diff }}
            ```
          branch: flake-update
          delete-branch: true
